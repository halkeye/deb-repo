concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: install zig
        run: pip3 install ziglang

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Install zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Restore cached packages
        id: cache-deb-packages-restore
        uses: actions/cache/restore@v5
        with:
          path: |
            tmp/amd64
            tmp/arm64
          key: packages-${{ hashFiles('main.go', 'packages/*.yaml') }}

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt update
          sudo apt install -y fakeroot cmake protobuf-compiler gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6:arm64

      - name: Create packages
        run: go run main.go --single-app dmux

      - name: Save cached packages
        id: cache-deb-packages-save
        uses: actions/cache/save@v5
        with:
          path: |
            tmp/amd64
            tmp/arm64
          key: ${{ steps.cache-deb-packages-restore.outputs.cache-primary-key }}

      - name: Install
        run: |
          sudo apt update
          sudo apt install -y reprepro

      - name: Build repo
        run: |
          for i in $(grep Codename repo/conf/distributions | awk '{print $2}'); do
            reprepro -b repo includedeb $i tmp/*/*.deb
          done

      - name: "Delete extra files"
        run: rm -rf repo/conf repo/db

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages
          path: repo

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

