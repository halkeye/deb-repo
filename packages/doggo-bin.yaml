name: doggo-bin
version: "1.2.0" # repo: mr-karan/doggo
type: release_asset
description: Command-line DNS Client for Humans.
url_overrides:
  arm64: https://github.com/mr-karan/doggo/releases/download/v{{ version }}/doggo-linux-arm.tar.gz
  amd64: https://github.com/mr-karan/doggo/releases/download/v{{ version }}/doggo-linux-x86_64.tar.gz
move_rules:
  - src_regex: doggo
    dst: /usr/local/bin/doggo
    mode: 0755
