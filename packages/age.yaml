name: age
url: https://github.com/FiloSottile/age/releases/download/v{{ version }}/age-v{{ version }}-linux-{{ deb_architecture }}.tar.gz
version: "1.3.1" # repo: FiloSottile/age
type: release_asset
move_rules:
  - src_regex: age$
    dst: /usr/local/bin/age
    mode: 0755
  - src_regex: age-keygen$
    dst: /usr/local/bin/age-keygen
    mode: 0755
  - src_regex: age-inspect$
    dst: /usr/local/bin/age-keygen
    mode: 0755
  - src_regex: age-plugin-batchpass$
    dst: /usr/local/bin/age-plugin-batchpass
    mode: 0755
