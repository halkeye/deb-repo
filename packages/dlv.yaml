name: dlv
version: "1.27.0" # repo: go-delve/delve
type: release_asset
description: Delve is a debugger for the Go programming language.
url_overrides:
  arm64: https://github.com/go-delve/delve/releases/download/v{{ version }}/dlv_{{ version }}_linux_arm64.tar.gz
  amd64: https://github.com/go-delve/delve/releases/download/v{{ version }}/dlv_{{ version }}_linux_amd64.tar.gz
move_rules:
  - src_regex: dlv
    dst: /usr/local/bin/dlv
    mode: 0755
