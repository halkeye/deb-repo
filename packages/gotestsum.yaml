name: gotestsum
version: "1.13.0" # repo: gotestyourself/gotestsum
description: "'go test' runner with output optimized for humans, JUnit XML for CI integration, and a summary of the test results."
url_overrides:
  arm64: https://github.com/gotestyourself/gotestsum/releases/download/v{{ version }}/gotestsum_{{ version }}_linux_arm64.tar.gz
  amd64: https://github.com/gotestyourself/gotestsum/releases/download/v{{ version }}/gotestsum_{{ version }}_linux_amd64.tar.gz
move_rules:
  - src_regex: gotestsum
    dst: /usr/local/bin/gotestsum
    mode: 0755
